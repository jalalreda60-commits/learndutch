# =============================================================================
# SnowB German AI — PR Quality Gate
# Runs on every pull request. Faster and lighter than the full CI workflow.
# =============================================================================

name: 🔍 PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # No cache: 'npm' — requires package-lock.json in repo.
      # Use manual node_modules cache instead (works with or without lock file).
      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.0'

      - name: 🗄️ Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 📦 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps --no-audit

      - name: 🔷 TypeScript check
        run: npm run type-check

      - name: 🔍 ESLint
        run: npm run lint

      - name: 🧪 Tests
        run: npm test -- --ci --forceExit --passWithNoTests
        env:
          EXPO_PUBLIC_APP_ENV: test
          EXPO_PUBLIC_ANTHROPIC_KEY: test-key
          EXPO_PUBLIC_FIREBASE_API_KEY: test-key
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test-project

      - name: ✅ All checks passed
        run: echo "Quality gate passed — ready for review! ✅"
